name: Shayaar Bot Sync

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 12 * * *' # Runs once a day at 12:00 UTC

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Grab the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install -r requirements.txt

      - name: Run the Brain (main.py)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_JSON: ${{ secrets.GOOGLE_JSON }}
          META_TOKEN: ${{ secrets.META_TOKEN }}
          INSTA_ID: ${{ secrets.INSTA_ID }}
        run: python main.py

      - name: Save the Reel for me to download
        uses: actions/upload-artifact@v4
        with:
          name: my-first-reel
          path: shayaar_reel.mp4
